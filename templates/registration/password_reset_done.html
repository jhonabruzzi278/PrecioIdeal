{% extends "base.html" %}

{% block title %}Enlace enviado — Precio Ideal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card stat-card mt-5">
            <div class="card-body p-4">
                <h1 class="h4 mb-2">Revisa tu correo</h1>
                <p class="text-muted small mb-4">
                    Si existe una cuenta con ese correo, te enviamos un enlace
                    para restablecer tu contraseña. Revisa también la carpeta de
                    spam.
                </p>
                <a href="{% url 'login' %}" class="btn btn-dark w-100">Volver a iniciar sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
