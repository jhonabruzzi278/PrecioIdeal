services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-precioideal}
      POSTGRES_USER: ${POSTGRES_USER:-precioideal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-precioideal}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - precioideal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-precioideal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - precioideal_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  precioideal_postgres_data:
  precioideal_redis_data:
